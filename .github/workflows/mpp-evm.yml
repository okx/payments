name: mpp-evm CI

on:
  push:
    paths:
      - "rust/mpp/**"
      - "rust/Cargo.toml"
      - "rust/Cargo.lock"
      - ".github/workflows/mpp-evm.yml"
  pull_request:
    paths:
      - "rust/mpp/**"
      - "rust/Cargo.toml"
      - "rust/Cargo.lock"
      - ".github/workflows/mpp-evm.yml"

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: short

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: cargo fmt (check)
        run: cargo fmt -p mpp-evm -- --check

      - name: cargo clippy
        run: cargo clippy -p mpp-evm --all-targets -- -D warnings

      - name: cargo test (unit + integration, no sandbox)
        # Sandbox tests are `#[ignore]`d — normal run excludes them.
        run: cargo test -p mpp-evm

      - name: cargo doc (no deps, deny warnings)
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc -p mpp-evm --no-deps
