name: rust CI

# Workspace-wide CI for the 5 publishable crates under `rust/`:
#   x402-core / x402-evm / x402-axum / mpp-evm / payment-router-axum
# Trigger on any change under `rust/**` plus this file itself.

on:
  push:
    paths:
      - "rust/**"
      - ".github/workflows/rust.yml"
  pull_request:
    paths:
      - "rust/**"
      - ".github/workflows/rust.yml"

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: short

jobs:
  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install stable toolchain (rustfmt only)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt --all -- --check
        run: cargo fmt --all -- --check

  clippy-test-doc:
    name: clippy + test + doc
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install stable toolchain (clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: cargo clippy --workspace
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test --workspace (excludes #[ignore] sandbox tests)
        run: cargo test --workspace

      - name: cargo doc --workspace (deny rustdoc warnings)
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --no-deps
